<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetWatch</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 16px;
    }

    header h1 { font-size: 22px; font-weight: 700; color: #7dd3fc; }
    header .subtitle { font-size: 13px; color: #475569; }
    .pulse { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    h2 { font-size: 14px; font-weight: 600; color: #94a3b8; text-transform: uppercase;
         letter-spacing: 0.08em; margin-bottom: 14px; }

    /* Device grid */
    .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 36px; }

    .device-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      border-left: 4px solid #334155;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .device-card:hover { transform: translateY(-1px); }
    .device-card.online  { border-left-color: #22c55e; }
    .device-card.offline { border-left-color: #ef4444; }
    .device-card.unknown { border-left-color: #f59e0b; }

    .device-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .device-host { font-size: 12px; color: #64748b; margin-bottom: 10px; font-family: monospace; }
    .device-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .meta-item { background: #0f1117; border-radius: 6px; padding: 6px 8px; }
    .meta-label { font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-value { font-size: 13px; font-weight: 600; margin-top: 1px; }

    .status-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .status-badge.online  { background: #14532d; color: #4ade80; }
    .status-badge.offline { background: #450a0a; color: #f87171; }
    .status-badge.unknown { background: #451a03; color: #fbbf24; }

    /* Alert log */
    .alert-log { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 36px; }
    .alert-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
                  border-bottom: 1px solid #0f1117; font-size: 13px; }
    .alert-item:last-child { border-bottom: none; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .alert-dot.online  { background: #22c55e; }
    .alert-dot.offline { background: #ef4444; }
    .alert-time { color: #475569; font-size: 11px; font-family: monospace; white-space: nowrap; }
    .no-alerts { color: #475569; font-size: 13px; text-align: center; padding: 16px 0; }

    #loading { color: #475569; text-align: center; padding: 60px 0; }
    #error-msg { color: #f87171; background: #450a0a; border-radius: 8px; padding: 12px 16px;
                 margin-bottom: 20px; display: none; }
  </style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <div>
    <h1>NetWatch</h1>
    <div class="subtitle" id="last-updated">Loading...</div>
  </div>
</header>

<div id="error-msg"></div>
<div id="loading">Connecting to NetWatch API...</div>

<div id="main-content" style="display:none">
  <h2>Devices</h2>
  <div class="device-grid" id="device-grid"></div>

  <h2>Recent Alerts</h2>
  <div class="alert-log" id="alert-log"></div>
</div>

<script>
  // Fetch device statuses from the Go API and render cards
  async function loadDevices() {
    const res = await fetch('/api/devices');
    const devices = await res.json();

    const grid = document.getElementById('device-grid');
    grid.innerHTML = '';

    if (!devices || devices.length === 0) {
      grid.innerHTML = '<p style="color:#475569;font-size:13px">No devices polled yet. Check that NetWatch is running and your config is set up.</p>';
      return;
    }

    devices.forEach(d => {
      const status = d.Reachable ? 'online' : 'offline';
      const rtt = d.RTTMs > 0 ? `${d.RTTMs.toFixed(1)} ms` : '—';
      const uptime = d.UptimeSecs > 0 ? formatUptime(d.UptimeSecs) : '—';
      const inMB = d.IfInOctets > 0 ? (d.IfInOctets / 1024 / 1024).toFixed(1) + ' MB' : '—';
      const outMB = d.IfOutOctets > 0 ? (d.IfOutOctets / 1024 / 1024).toFixed(1) + ' MB' : '—';

      grid.innerHTML += `
        <div class="device-card ${status}">
          <div class="status-badge ${status}">${status}</div>
          <div class="device-name">${d.DeviceName}</div>
          <div class="device-host">${d.Host}</div>
          <div class="device-meta">
            <div class="meta-item"><div class="meta-label">Latency</div><div class="meta-value">${rtt}</div></div>
            <div class="meta-item"><div class="meta-label">Uptime</div><div class="meta-value">${uptime}</div></div>
            <div class="meta-item"><div class="meta-label">Bytes In</div><div class="meta-value">${inMB}</div></div>
            <div class="meta-item"><div class="meta-label">Bytes Out</div><div class="meta-value">${outMB}</div></div>
          </div>
        </div>`;
    });
  }

  // Fetch and render the alert log
  async function loadAlerts() {
    const res = await fetch('/api/alerts');
    const alerts = await res.json();

    const log = document.getElementById('alert-log');

    if (!alerts || alerts.length === 0) {
      log.innerHTML = '<div class="no-alerts">No alerts yet — all quiet 🟢</div>';
      return;
    }

    log.innerHTML = alerts.map(a => {
      const time = new Date(a.timestamp).toLocaleString();
      return `
        <div class="alert-item">
          <div class="alert-dot ${a.event_type}"></div>
          <div style="flex:1">${a.message}</div>
          <div class="alert-time">${time}</div>
        </div>`;
    }).join('');
  }

  function formatUptime(secs) {
    const days = Math.floor(secs / 86400);
    const hours = Math.floor((secs % 86400) / 3600);
    const mins = Math.floor((secs % 3600) / 60);
    if (days > 0) return `${days}d ${hours}h`;
    if (hours > 0) return `${hours}h ${mins}m`;
    return `${mins}m`;
  }

  async function refresh() {
    try {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';

      await Promise.all([loadDevices(), loadAlerts()]);

      document.getElementById('last-updated').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    } catch (err) {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'block';
      errEl.textContent = 'Could not reach the NetWatch API. Is the server running? (' + err.message + ')';
    }
  }

  // Load immediately, then refresh every 15 seconds
  refresh();
  setInterval(refresh, 15000);
</script>
</body>
</html>
